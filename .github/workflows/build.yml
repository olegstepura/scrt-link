name: Build upstream main

on:
  schedule:
    - cron: "45 0 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild even if the current main SHA was already built."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  UPSTREAM: stophecom/scrt-link-v2
  IMAGE_NAME: scrt-link

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      short: ${{ steps.resolve.outputs.short }}
      build: ${{ steps.resolve.outputs.build }}
    steps:
      - name: Resolve upstream main
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail

          sha=$(gh api "repos/${UPSTREAM}/commits/main" --jq '.sha')
          short=${sha:0:7}
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short=$short" >> "$GITHUB_OUTPUT"
          echo "Upstream main: $sha (short: $short)"

          if [[ "$FORCE" == "true" ]]; then
            echo "Force rebuild requested."
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          existing=$(gh api "users/${OWNER}/packages/container/${IMAGE_NAME}/versions" \
            --paginate --jq '[.[].metadata.container.tags[]] | unique | .[]' 2>/dev/null || true)

          if printf '%s\n' "$existing" | grep -qxF "sha-$short"; then
            echo "sha-$short already built — skipping."
            echo "build=false" >> "$GITHUB_OUTPUT"
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout overlay (this repo)
        uses: actions/checkout@v4
        with:
          path: overlay

      - name: Checkout upstream at ${{ needs.check.outputs.sha }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM }}
          ref: ${{ needs.check.outputs.sha }}
          path: upstream

      - name: Apply overlay (Dockerfile + entrypoint)
        run: |
          set -euo pipefail
          cp overlay/Dockerfile upstream/Dockerfile
          cp overlay/docker-entrypoint.sh upstream/docker-entrypoint.sh
          chmod +x upstream/docker-entrypoint.sh

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ needs.check.outputs.short }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: upstream
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
