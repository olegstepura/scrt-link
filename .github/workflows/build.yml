name: Build upstream releases

on:
  schedule:
    - cron: "45 0 * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: "Upstream tag to (re)build (e.g. v1.2.3). Leave empty to scan for
          new tags."
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  UPSTREAM: stophecom/scrt-link-v2
  IMAGE_NAME: scrt-link

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.find.outputs.tags }}
      latest: ${{ steps.find.outputs.latest }}
    steps:
      - name: Find new upstream tags
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          upstream=$(gh api "repos/${UPSTREAM}/tags" --paginate --jq '.[].name' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)

          if [[ -z "$upstream" ]]; then
            echo "No upstream semver tags found."
            echo 'tags=[]' >> "$GITHUB_OUTPUT"
            echo 'latest=' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest=$(printf '%s\n' "$upstream" | sort -V | tail -n1)
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"
          echo "Upstream latest: ${latest}"

          if [[ -n "$INPUT_TAG" ]]; then
            jq -cn --arg t "$INPUT_TAG" '[$t]' > /tmp/tags.json
          else
            existing=$(gh api "users/${OWNER}/packages/container/${IMAGE_NAME}/versions" \
              --paginate --jq '[.[].metadata.container.tags[]] | unique | .[]' 2>/dev/null || true)

            echo "Existing GHCR tags:"
            printf '%s\n' "$existing" | sed 's/^/  /'

            if [[ -z "$existing" ]]; then
              printf '%s\n' "$upstream" | sort -V | jq -R . | jq -sc . > /tmp/tags.json
            else
              missing=$(printf '%s\n' "$upstream" | sort -u \
                | grep -vxF -f <(printf '%s\n' "$existing") || true)
              if [[ -z "$missing" ]]; then
                echo "Nothing to build."
                echo 'tags=[]' >> "$GITHUB_OUTPUT"
                exit 0
              fi
              printf '%s\n' "$missing" | sort -V | jq -R . | jq -sc . > /tmp/tags.json
            fi
          fi

          echo "Will build: $(cat /tmp/tags.json)"
          echo "tags=$(cat /tmp/tags.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    if: needs.discover.outputs.tags != '[]' && needs.discover.outputs.tags != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        tag: ${{ fromJson(needs.discover.outputs.tags) }}
    steps:
      - name: Checkout upstream at ${{ matrix.tag }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM }}
          ref: ${{ matrix.tag }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ matrix.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ matrix.tag }}
            type=semver,pattern={{major}},value=${{ matrix.tag }}
            type=raw,value=latest,enable=${{ matrix.tag == needs.discover.outputs.latest }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
